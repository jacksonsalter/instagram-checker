<!DOCTYPE html>
<html>
<head>

<title>Instagram Checker</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:220px;
}

button{
padding:10px 20px;
background:#4c6fff;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<h2>Instagram Checker</h2>

<form method="POST">

<input name="username" placeholder="Instagram Username" required>

<input name="password" type="password" placeholder="Password" required>

<input name="target" placeholder="Account To Check" required>

<button type="submit">Check</button>

</form>

<h3>{{ result }}</h3>

</body>
</html>
